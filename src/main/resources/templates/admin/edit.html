<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Edit</title>
</head>
<body>
<div class="container mt-4">
    <h2>Edit User</h2>
    <form th:action="@{/admin/update-user/{id}(id=${user.id})}" th:object="${user}" method="post">
        <div class="mb-3">
            <label class="form-label">Name</label>
            <input type="text" class="form-control" th:field="*{firstname}" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Lastname</label>
            <input type="text" class="form-control" th:field="*{lastname}" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Age</label>
            <input type="text" class="form-control" th:field="*{age}" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" class="form-control" th:field="*{email}" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="text" class="form-control" th:field="*{password}" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Roles (Checkboxes)</label>
            <div th:each="role : ${allRoles}" class="form-check">
                <input class="form-check-input" type="checkbox"
                       th:value="${role.id}"
                       th:name="selectedRoleIds"
                       th:id="${'role_' + role.id}">
                <label class="form-check-label" th:for="${'role_' + role.id}"
                       th:text="${role.name}"></label>
            </div>
        </div>
        <button type="submit" class="btn btn-warning">Update</button>
        <a th:href="@{/user}" class="btn btn-secondary">Cancel</a>
    </form>
</div>

</body>
</html>
