<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin panel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid">
        <span class="navbar-text text-white fw-bold"
              th:text="${user.email} + ' with roles: ' + ${#strings.listJoin(user.roleNames, ' ')}">
            admin@mail.ru with roles: ADMIN USER
        </span>

        <form th:action="@{/logout}" method="post">
            <button type="submit" class="btn btn-link text-white text-decoration-none">
                Logout
            </button>
        </form>
    </div>
</nav>

<div class="container-fluid">
    <div class="row">

        <div class="col-md-2 bg-white border-end pt-3">
            <ul class="nav flex-column">
                <li class="nav-item mb-2">
                    <a class="nav-link active bg-primary text-white fw-bold" th:href="@{/admin}">Admin</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link text-primary" th:href="@{/user}">User</a>
                </li>
            </ul>
        </div>

        <div class="col-md-10 pt-3">
            <h2>Admin panel</h2>

            <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
            <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

            <div class="mb-3">
                <a th:href="@{/admin}" class="btn btn-secondary me-2">Users table</a>
                <button type="button" class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#addUserModal">
                    New User
                </button>
            </div>

            <h5>All users</h5>
            <table class="table table-bordered">
                <thead class="table-light">
                <tr>
                    <th>ID</th>
                    <th>First Name</th>
                    <th>Last Name</th>
                    <th>Age</th>
                    <th>Email</th>
                    <th>Role</th>
                    <th>Edit</th>
                    <th>Delete</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="userDto : ${users}">
                    <td th:text="${userDto.id}">2</td>
                    <td th:text="${userDto.firstname}">admin</td>
                    <td th:text="${userDto.lastname}">admin</td>
                    <td th:text="${userDto.age}">35</td>
                    <td th:text="${userDto.email}">admin@mail.ru</td>
                    <td>
                        <span th:each="roleName : ${userDto.roleNames}"
                              th:text="${roleName}" class="me-1"></span>
                    </td>
                    <td class="text-center">
                        <button type="button" class="btn btn-sm btn-info text-white"
                                data-bs-toggle="modal" data-bs-target="#editUserModal"
                                th:data-user-id="${userDto.id}"
                                th:data-user-firstname="${userDto.firstname}"
                                th:data-user-lastname="${userDto.lastname}"
                                th:data-user-age="${userDto.age}"
                                th:data-user-email="${userDto.email}"
                                th:data-user-roles="${#strings.listJoin(userDto.roleIds, ',')}">
                            Edit
                        </button>
                    </td>
                    <td class="text-center">
                        <button type="button" class="btn btn-sm btn-danger"
                                data-bs-toggle="modal"
                                data-bs-target="#deleteUserModal"
                                th:data-user-id="${userDto.id}"
                                th:data-user-name="${userDto.firstname + ' ' + userDto.lastname}">
                            Delete
                        </button>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(users)}">
                    <td colspan="8" class="text-center">No users found</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<!-- add modal -->
<div class="modal fade" id="addUserModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <form th:action="@{/admin/add}" th:object="${userDto}" method="post">
                <div class="modal-header">
                    <h5 class="modal-title">Add new user</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label">First name</label>
                        <input type="text" th:field="*{firstname}" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Last name</label>
                        <input type="text" th:field="*{lastname}" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Age</label>
                        <input type="number" th:field="*{age}" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" th:field="*{email}" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Password</label>
                        <input type="password" th:field="*{password}" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Role</label>
                        <div th:each="role : ${allRoles}">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox"
                                       th:field="*{roleIds}" th:value="${role.id}"
                                       th:id="'addRole' + ${role.id}">
                                <label class="form-check-label" th:for="'addRole' + ${role.id}"
                                       th:text="${role.name}"></label>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                    <button type="submit" class="btn btn-primary">Add new user</button>
                </div>
            </form>
        </div>
    </div>
</div>

<!-- edit modal -->
<div class="modal fade" id="editUserModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <form th:action="@{/admin/edit}" method="post">
                <div class="modal-header">
                    <h5 class="modal-title">Edit user</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" name="id" id="editId">

                    <div class="mb-3">
                        <label class="form-label">ID</label>
                        <input type="text" id="editIdDisplay" class="form-control" disabled>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">First name</label>
                        <input type="text" name="firstname" id="editFirstname" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Last name</label>
                        <input type="text" name="lastname" id="editLastname" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Age</label>
                        <input type="number" name="age" id="editAge" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" name="email" id="editEmail" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Password</label>
                        <input type="password" name="password" id="editPassword" class="form-control"
                               placeholder="Leave blank to keep current">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Role</label>
                        <div th:each="role : ${allRoles}">
                            <div class="form-check">
                                <input class="form-check-input role-checkbox" type="checkbox"
                                       name="roleIds" th:value="${role.id}"
                                       th:id="'editRole' + ${role.id}">
                                <label class="form-check-label" th:for="'editRole' + ${role.id}"
                                       th:text="${role.name}"></label>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                    <button type="submit" class="btn btn-primary">Edit</button>
                </div>
            </form>
        </div>
    </div>
</div>

<!-- delete modal -->
<div class="modal fade" id="deleteUserModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <form th:action="@{/admin/delete}" method="post">
                <div class="modal-header">
                    <h5 class="modal-title">Delete user</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" name="id" id="deleteUserId">
                    <p>Are you sure you want to delete user <strong id="deleteUserName"></strong>?</p>
                    <p class="text-danger">This action cannot be undone!</p>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                    <button type="submit" class="btn btn-danger">Delete</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
    const editModal = document.getElementById('editUserModal');
    editModal.addEventListener('show.bs.modal', function(event) {
        const button = event.relatedTarget;

        document.getElementById('editId').value = button.getAttribute('data-user-id');
        document.getElementById('editIdDisplay').value = button.getAttribute('data-user-id');
        document.getElementById('editFirstname').value = button.getAttribute('data-user-firstname');
        document.getElementById('editLastname').value = button.getAttribute('data-user-lastname');
        document.getElementById('editAge').value = button.getAttribute('data-user-age');
        document.getElementById('editEmail').value = button.getAttribute('data-user-email');

        document.getElementById('editPassword').value = '';

        const rolesIds = button.getAttribute('data-user-roles');
        const checkboxes = document.querySelectorAll('#editUserModal .role-checkbox');
        checkboxes.forEach(checkbox => {
            checkbox.checked = rolesIds && rolesIds.split(',').includes(checkbox.value);
        });
    });

    const deleteModal = document.getElementById('deleteUserModal');
    deleteModal.addEventListener('show.bs.modal', function(event) {
        const button = event.relatedTarget;
        document.getElementById('deleteUserId').value = button.getAttribute('data-user-id');
        document.getElementById('deleteUserName').textContent = button.getAttribute('data-user-name');
    });
</script>
</body>
</html>
