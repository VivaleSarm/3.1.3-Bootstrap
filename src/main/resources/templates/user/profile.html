<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <title>User page</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid">
            <span class="navbar-text fw-bold"
                  th:text="${user.email} + ' with roles: ' + ${#strings.arrayJoin(user.roles.![name], ' ' )}">
                user@mail.ru with roles: USER
            </span>

        <form th:action="@{/logout}" method="post" class="d-flex">
            <button type="submit" class="btn btn-link text-light text-decoration-none">
                Logout
            </button>
        </form>
    </div>
</nav>

<div class="container-fluid">
    <div class="row">

        <nav class="col-md-3 col-lg-2 d-md-block bg-white border-end pt-3">
            <div class="position-sticky pt-3">
                <ul class="nav flex-column">
<!--                    <li class="nav-item mb-1" sec:authorize="hasRole('ADMIN')">-->
<!--                        <a class="nav-link active bg-primary text-white fw-bold" th:href="@{/admin}">-->
<!--                            Admin-->
<!--                        </a>-->
<!--                    </li>-->
                    <li class="nav-item mb-1" sec:authorize="hasRole('USER')">
                        <a class="nav-link active bg-primary text-white fw-bold rounded-1" th:href="@{/user}">
                            User
                        </a>
                    </li>
                </ul>
            </div>
        </nav>

        <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 py-4 bg-light">

            <h2 class="mb-4">User information-page</h2>

            <div class="card-border">
                <div class="card-header bg-white">
                    <h5 class="mb-0">About user</h5>

                    <div class="card-body p-0">
                        <div class="table-responsive">
                            <table class="table table-hover mb-0">
                                <thead class="table-light">
                                <tr>
                                    <th class="py-3">ID</th>
                                    <th class="py-3">First Name</th>
                                    <th class="py-3">Last Name</th>
                                    <th class="py-3">Age</th>
                                    <th class="py-3">Email</th>
                                    <th class="py-3">Role</th>
                                </tr>
                                </thead>
                                <tbody>
                                <tr>
                                    <td class="py-3" th:text="${user.id}">3</td>
                                    <td class="py-3" th:text="${user.firstname}">user</td>
                                    <td class="py-3" th:text="${user.lastname}">user</td>
                                    <td class="py-3" th:text="${user.age}">30</td>
                                    <td class="py-3" th:text="${user.email}">user@mail.ru</td>
                                    <td class="py-3">
                                        <!-- Вывод ролей -->
                                        <span th:each="role : ${user.roles}"
                                              th:text="${role.name}"
                                              class="me-2">
                                                USER
                                            </span>
                                    </td>
                                </tr>
                                </tbody>
                            </table>

                        </div>
            </div>
        </main>
    </div>
</div>
</body>
