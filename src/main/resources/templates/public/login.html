<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login page</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container d-flex justify-content-center alight-items-center min-vh-100">

    <div style="width: 100%; max-width:  300px; padding: 20px;">

        <h4 class="mb-3 fw-bold text-dark mt-4 ps-1">Please sign in</h4>

        <form th:action="@{/login}" method="post">

            <div class="mb-1">
                <input type="email"
                       name="username"
                       class="form-control"
                       placeholder="Email address"
                       required
                       autofocus>
            </div>

            <div class="mb-2">
                <input type="password"
                       name="password"
                       class="form-control"
                       placeholder="Password"
                       required>
            </div>

            <div th:if="${param.error}" class="alert alert-danger small mb-3">
                Bad credentials.
            </div>

            <div th:if="${param.registered}" class="alert alert-success small mb-3">
                Registration successful. Now sign in.
            </div>

            <button type="submit" class="btn btn-primary w-100">
                Sign in
            </button>

        </form>

        <div class="text-center">
            <span class="text-muted">Or</span>
            <a href="/register" class="btn btn-primary w-100">Sign up</a>
        </div>

    </div>

</div>

</body>
</html>
